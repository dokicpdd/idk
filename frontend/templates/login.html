<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <form id="login-form">
      <label>Username<br /><input id="username" name="username" required /></label><br />
      <label>Password<br /><input id="password" type="password" name="password" required /></label><br />
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/register">Register</a></p>
    <div id="message" style="color:red;margin-top:8px;"></div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const message = document.getElementById('message');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      message.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.error?.message || 'Login failed');
        // cookie is set by server; redirect to task page
        window.location.href = '/task';
      } catch (err) {
        message.textContent = err.message || 'Login failed';
      }
    });
  </script>
</body>
</html>
